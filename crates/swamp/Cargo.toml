[package]
name = "swamp"
version = "0.0.10"
edition = "2021"
license = "MIT"
description = "2D Game Engine"
repository = "https://github.com/swamp/swamp"
categories = ["game-development"]
keywords = ["game", "engine"]

[dependencies]
swamp-boot-game = { path = "../boot-game", version = "0.0.10" }
swamp-render-wgpu = { path = "../render-wgpu", version = "0.0.10" }
swamp-game-assets = { path = "../game-assets", version = "0.0.10" }
swamp-render = { path = "../render", version = "0.0.10" }
limnus = { path = "../../../limnus/crates/limnus", version = "0.0.10", features = ["audio"] }

swamp-game-audio = { path = "../game-audio", version = "0.0.10" }
[features]
audio = []
